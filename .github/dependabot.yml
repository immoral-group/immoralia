version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "motor-update"
    commit-message:
      prefix: "chore"
    allow:
      - dependency-name: "@Immoral-marketing/motor-blog"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
